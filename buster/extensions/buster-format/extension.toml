[extension]
id = "buster-format"
name = "Buster Format"
version = "0.1.0"
description = "Auto-detect and run formatters (prettier, rustfmt, black, gofmt) on save"

[capabilities]
workspace_read = true
commands = true
notifications = true

[[commands]]
id = "format_file"
label = "Format Current File"

[[commands]]
id = "check_formatters"
label = "Check Available Formatters"
